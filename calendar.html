<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中国日历</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f0e8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 20px;
    }

    .calendar-wrapper {
      width: 100%;
      max-width: 480px;
    }

    /* 金蝶发票云 Logo 区域 */
    .kingdee-logo-bar {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border-radius: 12px 12px 0 0;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .kingdee-logo-icon {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }

    .kingdee-logo-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .kingdee-brand {
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 1px;
      line-height: 1;
    }

    .kingdee-brand span {
      color: #f5a623;
    }

    .kingdee-product {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 2px;
      line-height: 1;
    }

    .kingdee-logo-divider {
      flex: 1;
    }

    .kingdee-badge {
      background: linear-gradient(135deg, #f5a623, #e8890c);
      color: white;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 10px;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    /* 顶部年月导航 */
    .calendar-header {
      background: #c0392b;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .nav-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-btn:hover {
      background: rgba(255,255,255,0.35);
    }

    .month-year {
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .lunar-year-label {
      font-size: 13px;
      opacity: 0.85;
      letter-spacing: 1px;
    }

    /* 星期行 */
    .weekdays {
      background: #e74c3c;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      padding: 8px 0;
    }

    .weekday {
      color: white;
      font-size: 13px;
      font-weight: 500;
    }

    .weekday.weekend {
      color: #ffd6d6;
    }

    /* 日期格子 */
    .days-grid {
      background: white;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border-radius: 0 0 12px 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    .day-cell {
      padding: 8px 4px;
      text-align: center;
      cursor: pointer;
      border-bottom: 1px solid #f0ebe0;
      border-right: 1px solid #f0ebe0;
      min-height: 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      position: relative;
    }

    .day-cell:hover {
      background: #fff5f5;
    }

    .day-cell.empty {
      background: #fafaf8;
      cursor: default;
    }

    .day-cell.today {
      background: #fff0f0;
    }

    .day-cell.today .solar-day {
      background: #c0392b;
      color: white;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .day-cell.selected {
      background: #fdecea;
    }

    .solar-day {
      font-size: 18px;
      font-weight: 500;
      color: #333;
      line-height: 1;
      margin-bottom: 3px;
    }

    .day-cell.weekend .solar-day {
      color: #c0392b;
    }

    .day-cell.other-month .solar-day {
      color: #ccc;
    }

    .day-cell.other-month .lunar-day {
      color: #ddd;
    }

    .lunar-day {
      font-size: 11px;
      color: #999;
      line-height: 1;
    }

    .lunar-day.festival {
      color: #c0392b;
      font-weight: 500;
    }

    /* 今日详情卡片 */
    .today-card {
      margin-top: 20px;
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .today-big-date {
      text-align: center;
      min-width: 80px;
    }

    .today-big-num {
      font-size: 56px;
      font-weight: bold;
      color: #c0392b;
      line-height: 1;
    }

    .today-weekday {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    .today-info {
      flex: 1;
      border-left: 2px solid #f0ebe0;
      padding-left: 20px;
    }

    .today-info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .info-label {
      color: #999;
    }

    .info-value {
      color: #333;
      font-weight: 500;
    }

    .info-value.red {
      color: #c0392b;
    }

    /* 节气标记 */
    .jieqi-badge {
      position: absolute;
      top: 3px;
      right: 3px;
      background: #27ae60;
      color: white;
      font-size: 9px;
      padding: 1px 3px;
      border-radius: 3px;
      line-height: 1.4;
    }
  </style>
</head>
<body>

<div class="calendar-wrapper">

  <!-- 金蝶发票云 Logo -->
  <div class="kingdee-logo-bar">
    <svg class="kingdee-logo-icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- 外圆背景 -->
      <circle cx="22" cy="22" r="20" fill="url(#kd-grad)" />
      <!-- 蝴蝶/蝶形图案 -->
      <path d="M22 22 C16 16, 8 14, 10 22 C8 30, 16 28, 22 22Z" fill="rgba(255,255,255,0.9)"/>
      <path d="M22 22 C28 16, 36 14, 34 22 C36 30, 28 28, 22 22Z" fill="rgba(255,255,255,0.9)"/>
      <path d="M22 22 C18 26, 14 32, 20 32 C24 32, 24 26, 22 22Z" fill="rgba(245,166,35,0.9)"/>
      <path d="M22 22 C26 26, 30 32, 24 32 C20 32, 20 26, 22 22Z" fill="rgba(245,166,35,0.9)"/>
      <!-- 中心点 -->
      <circle cx="22" cy="22" r="2.5" fill="white"/>
      <defs>
        <linearGradient id="kd-grad" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#2563eb"/>
          <stop offset="100%" stop-color="#1e40af"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="kingdee-logo-text">
      <div class="kingdee-brand">金蝶<span>发票云</span></div>
      <div class="kingdee-product">KINGDEE · INVOICE CLOUD</div>
    </div>
    <div class="kingdee-logo-divider"></div>
    <div class="kingdee-badge">智能财税</div>
  </div>

  <div class="calendar-header">
    <div class="nav-row">
      <button class="nav-btn" id="prevMonth">&#8249;</button>
      <div>
        <div class="month-year" id="monthYearLabel"></div>
        <div class="lunar-year-label" id="lunarYearLabel"></div>
      </div>
      <button class="nav-btn" id="nextMonth">&#8250;</button>
    </div>
  </div>

  <div class="weekdays">
    <div class="weekday weekend">日</div>
    <div class="weekday">一</div>
    <div class="weekday">二</div>
    <div class="weekday">三</div>
    <div class="weekday">四</div>
    <div class="weekday">五</div>
    <div class="weekday weekend">六</div>
  </div>

  <div class="days-grid" id="daysGrid"></div>

  <div class="today-card" id="todayCard"></div>
</div>

<script>
  // 农历数据（简化版，覆盖1900-2100年核心算法）
  const lunarInfo = [
    0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,
    0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,
    0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,
    0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,
    0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,
    0x06ca0,0x0b550,0x15355,0x04da0,0x0a5d0,0x14573,0x052b0,0x0a9a8,0x0e950,0x06aa0,
    0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,
    0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,
    0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,
    0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06aa0,0x0a6b6,0x056a0,0x02b40,0x0acb5,
    0x09270,0x04970,0x0d2e3,0x0d150,0x0e952,0x05aa0,0x05b60,0x0ab25,0x04b60,0x0a570,
    0x15273,0x052b0,0x0a9a8,0x0e950,0x06aa0,0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,
    0x05260,0x0f263,0x0d950,0x05b57,0x056a0,0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,
    0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,
    0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,
    0x06aa0,0x0a6b6,0x056a0,0x02b40,0x0acb5,0x09270,0x04970,0x0d2e3,0x0d150,0x0e952,
    0x05aa0,0x05b60,0x0ab25,0x04b60,0x0a570,0x15273,0x052b0,0x0a9a8,0x0e950,0x06aa0,
    0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,
    0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,
    0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570
  ];

  const heavenlyStems = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
  const earthlyBranches = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
  const zodiac = ["鼠","牛","虎","兔","龙","蛇","马","羊","猴","鸡","狗","猪"];
  const lunarMonths = ["正","二","三","四","五","六","七","八","九","十","冬","腊"];
  const lunarDays = [
    "初一","初二","初三","初四","初五","初六","初七","初八","初九","初十",
    "十一","十二","十三","十四","十五","十六","十七","十八","十九","二十",
    "廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"
  ];

  // 节气
  const solarTerms = {
    "1-6":"小寒","1-20":"大寒",
    "2-4":"立春","2-19":"雨水",
    "3-6":"惊蛰","3-21":"春分",
    "4-5":"清明","4-20":"谷雨",
    "5-6":"立夏","5-21":"小满",
    "6-6":"芒种","6-21":"夏至",
    "7-7":"小暑","7-23":"大暑",
    "8-7":"立秋","8-23":"处暑",
    "9-8":"白露","9-23":"秋分",
    "10-8":"寒露","10-23":"霜降",
    "11-7":"立冬","11-22":"小雪",
    "12-7":"大雪","12-22":"冬至"
  };

  // 公历节日
  const solarFestivals = {
    "1-1":"元旦","2-14":"情人节","3-8":"妇女节","3-12":"植树节",
    "4-1":"愚人节","5-1":"劳动节","5-4":"青年节","6-1":"儿童节",
    "7-1":"建党节","8-1":"建军节","9-10":"教师节",
    "10-1":"国庆节","11-11":"光棍节","12-25":"圣诞节"
  };

  // 农历节日
  const lunarFestivals = {
    "1-1":"春节","1-15":"元宵","2-2":"龙抬头","5-5":"端午",
    "7-7":"七夕","7-15":"中元","8-15":"中秋","9-9":"重阳",
    "12-8":"腊八","12-23":"小年","12-30":"除夕"
  };

  // 简化农历转换（基于1900年1月31日为农历正月初一）
  function getLunarDate(year, month, day) {
    const baseDate = new Date(1900, 0, 31);
    const targetDate = new Date(year, month - 1, day);
    let offset = Math.floor((targetDate - baseDate) / 86400000);

    let lunarYear = 1900;
    let daysInYear;

    while (lunarYear < 2100) {
      daysInYear = getLunarYearDays(lunarYear);
      if (offset < daysInYear) break;
      offset -= daysInYear;
      lunarYear++;
    }

    let leapMonth = getLeapMonth(lunarYear);
    let isLeap = false;
    let lunarMonth = 1;
    let daysInMonth;

    while (lunarMonth <= 12) {
      if (leapMonth > 0 && lunarMonth === leapMonth + 1 && !isLeap) {
        isLeap = true;
        lunarMonth--;
      }
      daysInMonth = isLeap ? getLeapDays(lunarYear) : getMonthDays(lunarYear, lunarMonth);
      if (offset < daysInMonth) break;
      offset -= daysInMonth;
      if (isLeap) isLeap = false;
      lunarMonth++;
    }

    const lunarDay = offset + 1;
    const stemIndex = (lunarYear - 4) % 10;
    const branchIndex = (lunarYear - 4) % 12;

    return {
      year: lunarYear,
      month: lunarMonth,
      day: lunarDay,
      isLeap,
      stem: heavenlyStems[stemIndex],
      branch: earthlyBranches[branchIndex],
      zodiac: zodiac[branchIndex],
      monthStr: (isLeap ? "闰" : "") + lunarMonths[lunarMonth - 1] + "月",
      dayStr: lunarDays[lunarDay - 1]
    };
  }

  function getLunarYearDays(y) {
    let sum = 348;
    for (let i = 0x8000; i > 0x8; i >>= 1) {
      sum += (lunarInfo[y - 1900] & i) ? 1 : 0;
    }
    return sum + getLeapDays(y);
  }

  function getLeapDays(y) {
    if (getLeapMonth(y)) {
      return (lunarInfo[y - 1900] & 0x10000) ? 30 : 29;
    }
    return 0;
  }

  function getLeapMonth(y) {
    return lunarInfo[y - 1900] & 0xf;
  }

  function getMonthDays(y, m) {
    return (lunarInfo[y - 1900] & (0x10000 >> m)) ? 30 : 29;
  }

  function getFestival(solarY, solarM, solarD, lunar) {
    const solarKey = `${solarM}-${solarD}`;
    if (solarFestivals[solarKey]) return solarFestivals[solarKey];

    const lunarKey = `${lunar.month}-${lunar.day}`;
    if (lunarFestivals[lunarKey]) return lunarFestivals[lunarKey];

    const termKey = `${solarM}-${solarD}`;
    if (solarTerms[termKey]) return solarTerms[termKey];

    return null;
  }

  function isJieqi(m, d) {
    return !!solarTerms[`${m}-${d}`];
  }

  // 状态
  const today = new Date();
  let currentYear = today.getFullYear();
  let currentMonth = today.getMonth() + 1;

  function renderCalendar() {
    const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
    const daysInPrevMonth = new Date(currentYear, currentMonth - 1, 0).getDate();

    // 更新标题
    document.getElementById("monthYearLabel").textContent =
      `${currentYear}年 ${currentMonth}月`;

    const lunarNew = getLunarDate(currentYear, currentMonth, 1);
    document.getElementById("lunarYearLabel").textContent =
      `${lunarNew.stem}${lunarNew.branch}年 · ${lunarNew.zodiac}年`;

    const grid = document.getElementById("daysGrid");
    grid.innerHTML = "";

    const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

    for (let i = 0; i < totalCells; i++) {
      const cell = document.createElement("div");
      cell.className = "day-cell";

      let cellYear = currentYear, cellMonth = currentMonth, cellDay;
      let isOtherMonth = false;

      if (i < firstDay) {
        cellDay = daysInPrevMonth - firstDay + i + 1;
        cellMonth = currentMonth - 1;
        if (cellMonth < 1) { cellMonth = 12; cellYear--; }
        isOtherMonth = true;
      } else if (i >= firstDay + daysInMonth) {
        cellDay = i - firstDay - daysInMonth + 1;
        cellMonth = currentMonth + 1;
        if (cellMonth > 12) { cellMonth = 1; cellYear++; }
        isOtherMonth = true;
      } else {
        cellDay = i - firstDay + 1;
      }

      const dayOfWeek = i % 7;
      const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
      const isToday = cellYear === today.getFullYear() &&
                      cellMonth === today.getMonth() + 1 &&
                      cellDay === today.getDate();

      if (isOtherMonth) cell.classList.add("other-month");
      if (isWeekend) cell.classList.add("weekend");
      if (isToday) cell.classList.add("today");

      const lunar = getLunarDate(cellYear, cellMonth, cellDay);
      const festival = getFestival(cellYear, cellMonth, cellDay, lunar);
      const jieqi = solarTerms[`${cellMonth}-${cellDay}`];

      // 节气角标
      if (jieqi && !isOtherMonth) {
        const badge = document.createElement("span");
        badge.className = "jieqi-badge";
        badge.textContent = jieqi;
        cell.appendChild(badge);
      }

      const solarEl = document.createElement("div");
      solarEl.className = "solar-day";
      solarEl.textContent = cellDay;
      cell.appendChild(solarEl);

      const lunarEl = document.createElement("div");
      lunarEl.className = "lunar-day" + (festival ? " festival" : "");
      if (festival) {
        lunarEl.textContent = festival.length > 3 ? festival.slice(0, 3) : festival;
      } else {
        lunarEl.textContent = lunar.day === 1 ? lunar.monthStr : lunar.dayStr;
      }
      cell.appendChild(lunarEl);

      grid.appendChild(cell);
    }

    renderTodayCard();
  }

  function renderTodayCard() {
    const t = today;
    const lunar = getLunarDate(t.getFullYear(), t.getMonth() + 1, t.getDate());
    const weekdays = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
    const festival = getFestival(t.getFullYear(), t.getMonth() + 1, t.getDate(), lunar);

    const card = document.getElementById("todayCard");
    card.innerHTML = `
      <div class="today-big-date">
        <div class="today-big-num">${t.getDate()}</div>
        <div class="today-weekday">${weekdays[t.getDay()]}</div>
      </div>
      <div class="today-info">
        <div class="today-info-row">
          <span class="info-label">公历</span>
          <span class="info-value">${t.getFullYear()}年${t.getMonth()+1}月${t.getDate()}日</span>
        </div>
        <div class="today-info-row">
          <span class="info-label">农历</span>
          <span class="info-value">${lunar.stem}${lunar.branch}年 ${lunar.monthStr}${lunar.dayStr}</span>
        </div>
        <div class="today-info-row">
          <span class="info-label">生肖</span>
          <span class="info-value">${lunar.zodiac}年</span>
        </div>
        ${festival ? `<div class="today-info-row">
          <span class="info-label">节日</span>
          <span class="info-value red">${festival}</span>
        </div>` : ""}
      </div>
    `;
  }

  document.getElementById("prevMonth").addEventListener("click", () => {
    currentMonth--;
    if (currentMonth < 1) { currentMonth = 12; currentYear--; }
    renderCalendar();
  });

  document.getElementById("nextMonth").addEventListener("click", () => {
    currentMonth++;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    renderCalendar();
  });

  renderCalendar();
</script>
</body>
</html>
